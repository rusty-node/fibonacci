name: CI

env:
  DEBUG: napi:*
  APP_NAME: napi-fibonacci

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-gnu
          - riscv64gc-unknown-linux-musl
          - s390x-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
          key: ${{ matrix.target }}-cargo-linux

      - uses: mlugg/setup-zig@v2
        if: contains(matrix.target, 'musl')
        with:
          version: 0.14.1

      - uses: taiki-e/install-action@v2
        if: contains(matrix.target, 'musl')
        with:
          tool: cargo-zigbuild

      - run: npm ci

      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            npm run build -- --target ${{ matrix.target }} -x
          elif [[ "${{ matrix.target }}" == "riscv64gc-unknown-linux-gnu" ]] || [[ "${{ matrix.target }}" == "s390x-unknown-linux-gnu" ]] || [[ "${{ matrix.target }}" == "powerpc64le-unknown-linux-gnu" ]] || [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            npm run build -- --target ${{ matrix.target }} --use-napi-cross
          else
            npm run build -- --target ${{ matrix.target }} --use-napi-cross
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: |
            ${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  test-linux-docker:
    name: Test ${{ matrix.target }} (node@${{ matrix.node }})
    needs: build-linux
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
        node:
          - '20'
          - '22'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: .

      - id: docker
        run: |
          node -e "
            const t = '${{ matrix.target }}';
            if (t.startsWith('aarch64')) console.log('PLATFORM=linux/arm64');
            else console.log('PLATFORM=linux/amd64');
          " >> "$GITHUB_OUTPUT"
          node -e "
            const t = '${{ matrix.target }}';
            console.log(t.endsWith('-musl') ? 'IMAGE=node:${{ matrix.node }}-alpine' : 'IMAGE=node:${{ matrix.node }}-slim');
          " >> "$GITHUB_OUTPUT"

      - uses: tj-actions/docker-run@v2
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          options: >-
            -v ${{ github.workspace }}:${{ github.workspace }}
            -w ${{ github.workspace }}
            --platform ${{ steps.docker.outputs.PLATFORM }}
          args: npm test

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-linux
      - test-linux-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - run: npx napi create-npm-dirs

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: npm run artifacts

      - run: ls -R ./npm

      - name: Publish (version tag only)
        run: |
          npm config set provenance true
          MSG="$(git log -1 --pretty=%B)"
          if echo "$MSG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
            npm publish --access public
          else
            echo "Skipping publish: last commit message is not a semver version (e.g. 0.1.0)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
